version: "3"

tasks:
  checks:quick:
    desc: Run narrow repo checks
    cmds:
      - nix eval .#nixosConfigurations.thinsandy.config.networking.hostName
      - nix eval .#nixosConfigurations.garnixMachine.config.networking.hostName
      - nix eval .#packages.x86_64-linux.nullclaw.meta.mainProgram
      - nix build .#checks.x86_64-linux.host-architecture -L
      - task checks:nix:lint

  checks:nullclaw:smoke:*:
    desc: Smoke-check nullclaw deployment on a remote host
    vars:
      HOST: '{{index .MATCH 0}}'
      SERVICE: '{{.SERVICE | default "nullclaw"}}'
      PORT: '{{.PORT | default "3001"}}'
      BIND: '{{.BIND | default "127.0.0.1"}}'
      WORKSPACE_ROOT: '{{.WORKSPACE_ROOT | default "/var/lib/nullclaw"}}'
      CONFIG_PATH: '{{.CONFIG_PATH | default ""}}'
      SECRET_PATH: '{{.SECRET_PATH | default ""}}'
      HEALTH_PATH: '{{.HEALTH_PATH | default ""}}'
    cmds:
      - |
        ssh {{.HOST}} "set -euo pipefail; \
          sudo systemctl is-active --quiet {{.SERVICE}}; \
          sudo test -d {{.WORKSPACE_ROOT}}; \
          sudo test -d {{.WORKSPACE_ROOT}}/.nullclaw; \
          sudo test -d {{.WORKSPACE_ROOT}}/workspace; \
          ss -ltnH | awk '{print \$4}' | grep -Fx '{{.BIND}}:{{.PORT}}' >/dev/null; \
          if [ -n '{{.CONFIG_PATH}}' ]; then sudo test -r '{{.CONFIG_PATH}}'; fi; \
          if [ -n '{{.SECRET_PATH}}' ]; then sudo test -r '{{.SECRET_PATH}}'; fi; \
          if [ -n '{{.HEALTH_PATH}}' ]; then curl -fsS --max-time 5 'http://{{.BIND}}:{{.PORT}}{{.HEALTH_PATH}}' >/dev/null; fi"

  checks:nullclaw:smoke:garnixMachine:
    desc: Smoke-check garnixMachine nullclaw deployment (config-file staging pattern)
    vars:
      CONFIG_PATH: "/var/lib/nullclaw/.nullclaw/config.json"
      SECRET_PATH: "/run/secrets/nullclaw-config"
    cmds:
      - task checks:nullclaw:smoke:garnixMachine CONFIG_PATH={{.CONFIG_PATH}} SECRET_PATH={{.SECRET_PATH}}

  checks:nullclaw:smoke:mtfuji:
    desc: Smoke-check mtfuji nullclaw deployment (env-file pattern)
    vars:
      SECRET_PATH: "/run/secrets/nullclaw"
    cmds:
      - task checks:nullclaw:smoke:mtfuji SECRET_PATH={{.SECRET_PATH}}

  checks:nullclaw:smoke:thinsandy:
    desc: Smoke-check thinsandy nullclaw deployment (direct env-file pattern)
    vars:
      SECRET_PATH: "/run/secrets/nullclaw"
    cmds:
      - task checks:nullclaw:smoke:thinsandy SECRET_PATH={{.SECRET_PATH}}

  checks:nullclaw:smoke:kellerbench:
    desc: Smoke-check kellerbench nullclaw deployment (on-demand host semantics)
    vars:
      SECRET_PATH: "/run/secrets/nullclaw"
    cmds:
      - |
        set -euo pipefail
        if ! ssh -o BatchMode=yes -o ConnectTimeout=5 -o ConnectionAttempts=1 kellerbench "true" >/dev/null 2>&1; then
          echo "kellerbench is unreachable; treating as intentional on-demand power-off."
          exit 0
        fi
        task checks:nullclaw:smoke:kellerbench SECRET_PATH={{.SECRET_PATH}}

  checks:nix:lint:
    desc: Run deadnix and statix on all nix files
    cmds:
      - nix-shell -p deadnix statix --run "deadnix --fail flake.nix flake hosts modules pkgs overlays lib && (statix check || true)"

  checks:nix:fix:
    desc: Auto-fix formatting, dead code, and style lints on all Nix files
    cmds:
      - nix-shell -p deadnix statix alejandra --run "deadnix --edit flake.nix flake hosts modules pkgs overlays lib; statix fix; alejandra flake.nix flake hosts modules overlays pkgs lib"

  checks:nix:format:
    desc: Check Nix file formatting with alejandra (read-only)
    cmds:
      - nix-shell -p alejandra --run "alejandra --check flake hosts modules overlays pkgs lib"

  checks:status:
    desc: Show task and git status
    cmds:
      - task --list-all
      - git status --short
