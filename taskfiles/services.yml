version: "3"

tasks:
  services:rebuild:pre-hook:
    desc: Pre-rebuild hook (reserved)
    cmds: []

  pre-hook-rebuild:
    desc: Alias for services:rebuild:pre-hook
    cmds:
      - task services:rebuild:pre-hook

  services:switch:*:
    desc: Switch current host using a rebuild command (nixos|darwin)
    vars:
      OS: '{{index .MATCH 0}}'
    cmds:
      - sudo {{.OS}}-rebuild switch --flake .?submodules=1#$(hostname) |& nom; task dev:git:prehook && git commit -m "$(hostname) $({{.OS}}-rebuild list-generations | awk 'NR==2 {print $1, $2, $6; exit}')" && task dev:git:posthook

  switch:*:
    desc: Alias for services:switch:*
    vars:
      OS: '{{index .MATCH 0}}'
    cmds:
      - task services:switch:{{.OS}}

  services:boot:*:
    desc: "[destructive] Boot into next generation via rebuild command"
    vars:
      OS: '{{index .MATCH 0}}'
    cmds:
      - sudo {{.OS}}-rebuild boot --flake .?submodules=1#$(hostname) |& nom; task dev:git:build-push

  boot:*:
    desc: Alias for services:boot:*
    vars:
      OS: '{{index .MATCH 0}}'
    cmds:
      - task services:boot:{{.OS}}

  services:plan:host:*:
    desc: Build/evaluate a specific host closure (no apply)
    vars:
      HOST: '{{index .MATCH 0}}'
    cmds:
      - nix build .#nixosConfigurations.{{.HOST}}.config.system.build.toplevel -L

  services:apply:host:*:
    desc: Apply a specific remote host configuration (no git side effects)
    vars:
      HOST: '{{index .MATCH 0}}'
    cmds:
      - nixos-rebuild switch --use-remote-sudo --target-host {{.HOST}} --fast --flake .?submodules=1#{{.HOST}} |& nom

  services:validate:host:*:
    desc: Validate a deployed host (uses host-specific smoke checks when wired)
    vars:
      HOST: '{{index .MATCH 0}}'
      MANIFEST: ./taskfiles/ai-host-manifest.json
    cmds:
      - |
        validation_task=$(jq -r --arg host "{{.HOST}}" '.hosts[$host].validationTask // ""' {{.MANIFEST}})
        if [ -n "$validation_task" ] && [ "$validation_task" != "null" ]; then
          task "$validation_task"
        else
          echo "No host-specific validation task wired for {{.HOST}}"
        fi

  services:evidence:capture:host:*:
    desc: Capture AI host evidence bundle (no validation execution)
    vars:
      HOST: '{{index .MATCH 0}}'
      MANIFEST: ./taskfiles/ai-host-manifest.json
      EVIDENCE_ROOT: ./evidence/ai-hosts
      EVENT: '{{.EVENT | default "validate"}}'
      VALIDATION_RESULT: '{{.VALIDATION_RESULT | default "pass"}}'
    cmds:
      - scripts/task/ai-host-evidence.sh --host {{.HOST}} --event {{.EVENT}} --manifest {{.MANIFEST}} --output-root {{.EVIDENCE_ROOT}} --validation-result {{.VALIDATION_RESULT}}

  services:evidence:validate:host:*:
    desc: Run host validation and capture evidence bundle
    vars:
      HOST: '{{index .MATCH 0}}'
      MANIFEST: ./taskfiles/ai-host-manifest.json
      EVIDENCE_ROOT: ./evidence/ai-hosts
    cmds:
      - |
        set -euo pipefail
        result="pass"
        if ! task services:validate:host:{{.HOST}}; then
          result="fail"
        fi
        scripts/task/ai-host-evidence.sh --host {{.HOST}} --event validate --manifest {{.MANIFEST}} --output-root {{.EVIDENCE_ROOT}} --validation-result "$result"
        [ "$result" = "pass" ]

  services:drift:audit:host:*:
    desc: Audit live host drift against AI host manifest and capture drift evidence
    vars:
      HOST: '{{index .MATCH 0}}'
      MANIFEST: ./taskfiles/ai-host-manifest.json
      DRIFT_ROOT: ./evidence/drift
      REHEARSAL_FINGERPRINT: '{{.REHEARSAL_FINGERPRINT | default ""}}'
    cmds:
      - |
        if [ -n "{{.REHEARSAL_FINGERPRINT}}" ]; then
          scripts/task/ai-host-drift-audit.sh --host {{.HOST}} --manifest {{.MANIFEST}} --output-root {{.DRIFT_ROOT}} --rehearsal-fingerprint {{.REHEARSAL_FINGERPRINT}}
        else
          scripts/task/ai-host-drift-audit.sh --host {{.HOST}} --manifest {{.MANIFEST}} --output-root {{.DRIFT_ROOT}}
        fi

  services:drift:audit:canary:
    desc: Audit drift for canary AI hosts
    vars:
      MANIFEST: ./taskfiles/ai-host-manifest.json
    cmds:
      - |
        set -euo pipefail
        while IFS= read -r host; do
          [ -z "$host" ] && continue
          task services:drift:audit:host:$host
        done < <(jq -r '.hosts | to_entries[] | select(.value.promotionGroup == "canary") | .key' {{.MANIFEST}})

  services:drift:audit:class:*:
    desc: Audit drift for all AI hosts in a class
    vars:
      CLASS: '{{index .MATCH 0}}'
      MANIFEST: ./taskfiles/ai-host-manifest.json
    cmds:
      - |
        set -euo pipefail
        while IFS= read -r host; do
          [ -z "$host" ] && continue
          task services:drift:audit:host:$host
        done < <(jq -r --arg class "{{.CLASS}}" '.hosts | to_entries[] | select(.value.hostClass == $class) | .key' {{.MANIFEST}})

  services:rehearse:nullclaw:host:*:
    desc: Rehearse safe nullclaw failure fingerprint detection + recovery evidence flow
    vars:
      HOST: '{{index .MATCH 0}}'
      FINGERPRINT: '{{.FINGERPRINT | default "missing-readable-path"}}'
    cmds:
      - |
        set -euo pipefail
        case "{{.FINGERPRINT}}" in
          missing-readable-path|missing-listener|nullclaw-inactive|nginx-upstream-mismatch) ;;
          *)
            echo "Unsupported fingerprint '{{.FINGERPRINT}}'"
            exit 2
            ;;
        esac
        task services:evidence:validate:host:{{.HOST}}
        if task services:drift:audit:host:{{.HOST}} REHEARSAL_FINGERPRINT={{.FINGERPRINT}}; then
          echo "Rehearsal expected a drift failure for fingerprint {{.FINGERPRINT}}, but audit passed"
          exit 1
        fi
        task services:evidence:validate:host:{{.HOST}}
        task services:drift:audit:host:{{.HOST}}

  services:status:ai-hosts:
    desc: Show synthesized AI host fleet status from manifest + evidence
    vars:
      MANIFEST: ./taskfiles/ai-host-manifest.json
      EVIDENCE_ROOT: ./evidence/ai-hosts
      DRIFT_ROOT: ./evidence/drift
      PROMOTIONS_ROOT: ./evidence/promotions
      WAIVERS: ./taskfiles/ai-host-waivers.json
    cmds:
      - scripts/task/ai-host-status.sh --mode fleet --manifest {{.MANIFEST}} --evidence-root {{.EVIDENCE_ROOT}} --drift-root {{.DRIFT_ROOT}} --promotions-root {{.PROMOTIONS_ROOT}} --waivers {{.WAIVERS}}

  services:status:host:*:
    desc: Show synthesized status for a single AI host
    vars:
      HOST: '{{index .MATCH 0}}'
      MANIFEST: ./taskfiles/ai-host-manifest.json
      EVIDENCE_ROOT: ./evidence/ai-hosts
      DRIFT_ROOT: ./evidence/drift
      PROMOTIONS_ROOT: ./evidence/promotions
      WAIVERS: ./taskfiles/ai-host-waivers.json
    cmds:
      - scripts/task/ai-host-status.sh --mode host --host {{.HOST}} --manifest {{.MANIFEST}} --evidence-root {{.EVIDENCE_ROOT}} --drift-root {{.DRIFT_ROOT}} --promotions-root {{.PROMOTIONS_ROOT}} --waivers {{.WAIVERS}}

  services:status:promotion-readiness:
    desc: Show promotion-readiness across AI hosts
    vars:
      MANIFEST: ./taskfiles/ai-host-manifest.json
      EVIDENCE_ROOT: ./evidence/ai-hosts
      DRIFT_ROOT: ./evidence/drift
      PROMOTIONS_ROOT: ./evidence/promotions
      WAIVERS: ./taskfiles/ai-host-waivers.json
    cmds:
      - scripts/task/ai-host-status.sh --mode readiness --manifest {{.MANIFEST}} --evidence-root {{.EVIDENCE_ROOT}} --drift-root {{.DRIFT_ROOT}} --promotions-root {{.PROMOTIONS_ROOT}} --waivers {{.WAIVERS}}

  services:status:delta:host:*:
    desc: Compare promoted baseline (or latest good validation fallback) vs latest drift and report newly introduced issues
    vars:
      HOST: '{{index .MATCH 0}}'
      MANIFEST: ./taskfiles/ai-host-manifest.json
      EVIDENCE_ROOT: ./evidence/ai-hosts
      DRIFT_ROOT: ./evidence/drift
      PROMOTIONS_ROOT: ./evidence/promotions
      WAIVERS: ./taskfiles/ai-host-waivers.json
    cmds:
      - scripts/task/ai-host-status.sh --mode delta --host {{.HOST}} --manifest {{.MANIFEST}} --evidence-root {{.EVIDENCE_ROOT}} --drift-root {{.DRIFT_ROOT}} --promotions-root {{.PROMOTIONS_ROOT}} --waivers {{.WAIVERS}}

  services:promote:finalize:host:*:
    desc: Finalize host promotion with receipt + baseline update
    vars:
      HOST: '{{index .MATCH 0}}'
      MANIFEST: ./taskfiles/ai-host-manifest.json
      EVIDENCE_ROOT: ./evidence/ai-hosts
      DRIFT_ROOT: ./evidence/drift
      PROMOTIONS_ROOT: ./evidence/promotions
      WAIVERS: ./taskfiles/ai-host-waivers.json
    cmds:
      - scripts/task/ai-host-promote.sh --host {{.HOST}} --manifest {{.MANIFEST}} --evidence-root {{.EVIDENCE_ROOT}} --drift-root {{.DRIFT_ROOT}} --promotions-root {{.PROMOTIONS_ROOT}} --waivers {{.WAIVERS}}

  services:record:host:*:
    desc: Record deployment outcome in git (manual/operator-triggered)
    vars:
      HOST: '{{index .MATCH 0}}'
    cmds:
      - task dev:git:prehook
      - git commit -m "nix-build was successful on {{.HOST}}"
      - task dev:git:posthook

  services:rollback:apply:host:*:
    desc: Roll back a remote host to previous generation (apply only)
    vars:
      HOST: '{{index .MATCH 0}}'
    cmds:
      - ssh {{.HOST}} "sudo nixos-rebuild switch --rollback"

  services:evidence:rollback:host:*:
    desc: Validate after rollback and capture rollback evidence bundle
    vars:
      HOST: '{{index .MATCH 0}}'
      MANIFEST: ./taskfiles/ai-host-manifest.json
      EVIDENCE_ROOT: ./evidence/ai-hosts
    cmds:
      - |
        set -euo pipefail
        result="pass"
        if ! task services:validate:host:{{.HOST}}; then
          result="fail"
        fi
        scripts/task/ai-host-evidence.sh --host {{.HOST}} --event rollback --manifest {{.MANIFEST}} --output-root {{.EVIDENCE_ROOT}} --validation-result "$result"
        [ "$result" = "pass" ]

  services:rollback:host:*:
    desc: Roll back host, re-validate, and capture rollback evidence
    vars:
      HOST: '{{index .MATCH 0}}'
    cmds:
      - task services:rollback:apply:host:{{.HOST}}
      - task services:evidence:rollback:host:{{.HOST}}

  services:deploy:host:*:
    desc: Plan + apply + validate a specific remote host (no git side effects)
    vars:
      HOST: '{{index .MATCH 0}}'
    cmds:
      - task services:plan:host:{{.HOST}}
      - task services:apply:host:{{.HOST}}
      - task services:validate:host:{{.HOST}}

  services:promote:host:*:
    desc: Promote a single AI host (checks + validate + drift + receipt + baseline)
    vars:
      HOST: '{{index .MATCH 0}}'
    cmds:
      - task checks:fleet
      - |
        set -euo pipefail
        validate_rc=0
        drift_rc=0
        task services:evidence:validate:host:{{.HOST}} || validate_rc=$?
        task services:drift:audit:host:{{.HOST}} || drift_rc=$?
        task services:promote:finalize:host:{{.HOST}}
        [ "$validate_rc" -eq 0 ] && [ "$drift_rc" -eq 0 ]

  services:promote:canary:
    desc: Promote canary AI hosts from manifest
    vars:
      MANIFEST: ./taskfiles/ai-host-manifest.json
    cmds:
      - |
        set -euo pipefail
        while IFS= read -r host; do
          [ -z "$host" ] && continue
          task services:promote:host:$host
        done < <(jq -r '.hosts | to_entries[] | select(.value.promotionGroup == "canary") | .key' {{.MANIFEST}})

  services:promote:class:*:
    desc: Promote all AI hosts in a hostClass from manifest
    vars:
      CLASS: '{{index .MATCH 0}}'
      MANIFEST: ./taskfiles/ai-host-manifest.json
    cmds:
      - |
        set -euo pipefail
        while IFS= read -r host; do
          [ -z "$host" ] && continue
          task services:promote:host:$host
        done < <(jq -r --arg class "{{.CLASS}}" '.hosts | to_entries[] | select(.value.hostClass == $class) | .key' {{.MANIFEST}})

  prb:*:
    desc: Alias for services:deploy:host:*
    vars:
      HOST: '{{index .MATCH 0}}'
    cmds:
      - task services:deploy:host:{{.HOST}}

  services:rebuild:nixos:
    desc: Rebuild local NixOS host and refresh ~/Taskfile.yml
    cmds:
      - task services:rebuild:pre-hook
      - task services:switch:nixos
      - task infra:secrets:decrypt:detaskfile-home

  nixos-rebuild:
    desc: Alias for services:rebuild:nixos
    cmds:
      - task services:rebuild:nixos

  services:rebuild:darwin:
    desc: Rebuild local Darwin host and refresh ~/Taskfile.yml
    cmds:
      - task services:rebuild:pre-hook
      - task services:switch:darwin
      - task infra:secrets:decrypt:detaskfile-home

  darwin-rebuild:
    desc: Alias for services:rebuild:darwin
    cmds:
      - task services:rebuild:darwin

  services:rebuild:home-manager:
    desc: Rebuild local Home Manager profile and push build commit
    cmds:
      - task services:rebuild:pre-hook
      - home-manager switch --flake .?submodules=1#$(hostname) |& nom; task dev:git:build-push
      - task infra:secrets:decrypt:detaskfile-home

  home-manager-switch:
    desc: Alias for services:rebuild:home-manager
    cmds:
      - task services:rebuild:home-manager

  services:rebuild:wsl:
    desc: Rebuild WSL host configuration
    cmds:
      - task services:rebuild:pre-hook
      - sudo nixos-rebuild switch --flake .?submodules=1#guckloch --use-substitutes |& nom; task dev:git:build-push

  wsl-rebuild:
    desc: Alias for services:rebuild:wsl
    cmds:
      - task services:rebuild:wsl

  services:rebuild:orb:
    desc: Rebuild OrbStack host configuration and refresh ~/Taskfile.yml
    cmds:
      - task services:rebuild:pre-hook
      - sudo nixos-rebuild switch --flake .?submodules=1#$(hostname) --impure |& nom; task dev:git:build-push
      - task infra:secrets:decrypt:detaskfile-home

  orb-rebuild:
    desc: Alias for services:rebuild:orb
    cmds:
      - task services:rebuild:orb

  services:deploy:rpi:
    desc: Deploy configured Raspberry Pi host
    cmds:
      - task services:deploy:host:{{.PI}}

  push-rpi-rebuild:
    desc: Alias for services:deploy:rpi
    cmds:
      - task services:deploy:rpi

  services:deploy:thinsandy:
    desc: Deploy thinsandy host
    cmds:
      - task services:deploy:host:thinsandy

  push-thin-rebuild:
    desc: Alias for services:deploy:thinsandy
    cmds:
      - task services:deploy:thinsandy

  services:deploy:mtfuji:
    desc: Deploy mtfuji host
    cmds:
      - task services:deploy:host:mtfuji

  push-fuji-rebuild:
    desc: Alias for services:deploy:mtfuji
    cmds:
      - task services:deploy:mtfuji

  services:deploy:menu:
    desc: Choose a deployment target
    cmds:
      - |
        choice=$(printf '%s\n' push-rpi-rebuild push-thin-rebuild push-fuji-rebuild exit | gum choose)
        task "$choice"

  rebuild:
    desc: Legacy rebuild menu
    cmds:
      - |
        choice=$(printf '%s\n' nixos-rebuild darwin-rebuild home-manager-switch wsl-rebuild orb-rebuild push-rpi-rebuild push-thin-rebuild push-fuji-rebuild exit | gum choose)
        task "$choice"

  services:logs:host:*:
    desc: "Tail journal logs for a host via ssh (default unit: go-backend)"
    vars:
      HOST: '{{index .MATCH 0}}'
      UNIT: '{{.UNIT | default "go-backend"}}'
    cmds:
      - ssh {{.HOST}} "journalctl -fu {{.UNIT}}"

  services:logs:menu:
    desc: Choose a logs target
    cmds:
      - |
        host=$(printf '%s\n' {{.SERVER}} thinsandy mtfuji {{.PI}} exit | gum choose)
        [ "$host" = "exit" ] || task services:logs:host:$host
