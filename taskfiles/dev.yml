version: "3"

tasks:
  dev:git:quick-push:
    desc: Commit/push config updates quickly
    cmds:
      - task dev:git:prehook
      - 'git commit -m "tidy: config update from $(hostname)"'
      - task dev:git:posthook

  git-quick-push:
    desc: Alias for dev:git:quick-push
    cmds:
      - task dev:git:quick-push

  dev:git:build-push:
    desc: Commit/push after successful build
    cmds:
      - task dev:git:prehook
      - git commit -m "nix-build was successful on $(uname -a)"
      - task dev:git:posthook

  git-build-push:
    desc: Alias for dev:git:build-push
    cmds:
      - task dev:git:build-push

  dev:git:quick-pull:
    desc: Pull with submodules and reload Taskfile
    cmds:
      - git pull --recurse-submodules
      - task infra:load:taskfile

  git-quick-pull:
    desc: Alias for dev:git:quick-pull
    cmds:
      - task dev:git:quick-pull

  dev:git:prehook:
    desc: "[destructive] Refresh Taskfile.yml before commit"
    cmds:
      - rm ./Taskfile.yml
      - git add .
      - task infra:load:taskfile

  git-prehook:
    desc: Alias for dev:git:prehook
    cmds:
      - task dev:git:prehook

  dev:git:posthook:
    desc: Push current branch
    cmds:
      - git push

  git-posthook:
    desc: Alias for dev:git:posthook
    cmds:
      - task dev:git:posthook

  dev:site:list:
    desc: List site deployment targets from manifest
    cmds:
      - ./scripts/task/site-target.sh list

  dev:site:show:*:
    desc: Show manifest metadata for a site target
    vars:
      TARGET: '{{index .MATCH 0}}'
    cmds:
      - ./scripts/task/site-target.sh show {{.TARGET}}

  dev:site:build:*:
    desc: Build a site target from manifest
    vars:
      TARGET: '{{index .MATCH 0}}'
    cmds:
      - ./scripts/task/site-target.sh build {{.TARGET}}

  dev:site:preview:*:
    desc: Preview a site target from manifest
    vars:
      TARGET: '{{index .MATCH 0}}'
    cmds:
      - ./scripts/task/site-target.sh preview {{.TARGET}}

  dev:site:deploy:*:
    desc: Deploy a site target from manifest
    vars:
      TARGET: '{{index .MATCH 0}}'
    cmds:
      - ./scripts/task/site-target.sh deploy {{.TARGET}}

  dev:site:build:
    desc: Build the default site target from manifest
    cmds:
      - ./scripts/task/site-target.sh build

  dev:site:preview:
    desc: Preview the default site target from manifest
    cmds:
      - ./scripts/task/site-target.sh preview

  dev:site:deploy:
    desc: Deploy the default site target from manifest
    cmds:
      - ./scripts/task/site-target.sh deploy

  dev:site:sync-verntil:
    desc: Alias for dev:site:deploy
    cmds:
      - task dev:site:deploy

  verntil:
    desc: Alias for dev:site:deploy
    cmds:
      - task dev:site:deploy

  dev:flake:update-branch:
    desc: "[destructive] Create/reset update branch and force-push flake.lock update"
    cmds:
      - git branch -D update || true
      - git switch -c update
      - nix flake update
      - git add flake.lock
      - git commit -s -m "flake update"
      - git push -f
      - git switch main

  update-flake:
    desc: Alias for dev:flake:update-branch
    cmds:
      - task dev:flake:update-branch

  dev:flake:merge-update:
    desc: "[destructive] Merge update branch into main and delete branch"
    cmds:
      - git switch main
      - git merge update
      - git branch -d update

  upgrade-flake:
    desc: Alias for dev:flake:merge-update
    cmds:
      - task dev:flake:merge-update

  dev:flake:update:bountystash:
    desc: Update only the bountystash flake input
    cmds:
      - nix flake update bountystash

  update-bountystash:
    desc: Alias for dev:flake:update:bountystash
    cmds:
      - task dev:flake:update:bountystash
