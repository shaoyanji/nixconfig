version: "3"

tasks:
  infra:load:menu:
    desc: Choose a load action
    cmds:
      - |
        choice=$(printf '%s\n' infra:load:env infra:load:taskfile exit | gum choose)
        task "$choice"

  infra:load:env:
    desc: Load common API env lines from encrypted env file
    cmds:
      - task infra:api:get:API
      - task infra:api:get:POP
      - task infra:api:get:TOKEN

  infra:load:taskfile:
    desc: Decrypt operator Taskfile from secrets repo into local Taskfile.yml
    cmds:
      - scripts/task/sops-decrypt-to.sh "{{.SECRETS}}/{{.ENC_TASKFILE}}" "./Taskfile.yml"

  infra:api:get:*:
    desc: Print matching API key line from encrypted env file
    vars:
      API: '{{index .MATCH 0}}'
    cmds:
      - sops -d {{.SECRETS}}/{{.ENC_ENVS}} | yq -o=shell . | grep {{.API}}

  infra:sops:get:*:
    desc: Query secrets file and print matching value
    vars:
      QUERY: '{{index .MATCH 0}}'
    cmds:
      - sops -d {{.SECRETS}}/{{.ENC_SECRETS}} | yq -o=shell . | grep {{.QUERY}} | awk -F'=' '{print $2}'

  infra:sops:fzf:
    desc: Select env entries from encrypted env file
    cmds:
      - sops -d {{.SECRETS}}/{{.ENC_ENVS}} | yq -o=shell . | fzf -m | awk '{ gsub(/\047/, ""); print }'

  infra:secrets:edit:apikeys:
    desc: Edit encrypted API keys and push to secrets repo
    cmds:
      - scripts/task/sops-edit-commit.sh "{{.SECRETS}}" "{{.ENC_ENVS}}" "taskfile - update"

  infra:secrets:edit:taskfile:
    desc: Edit encrypted Taskfile and refresh local Taskfile.yml
    cmds:
      - scripts/task/sops-edit-commit.sh "{{.SECRETS}}" "{{.ENC_TASKFILE}}" "taskfile - update"
      - task infra:load:taskfile

  infra:secrets:edit:detaskfile:
    desc: Edit encrypted DE Taskfile and refresh ~/Taskfile.yml
    cmds:
      - scripts/task/sops-edit-commit.sh "{{.SECRETS}}" "{{.ENC_DETASKFILE}}" "detaskfile - update"
      - scripts/task/sops-decrypt-to.sh "{{.SECRETS}}/{{.ENC_DETASKFILE}}" "$HOME/Taskfile.yml"

  infra:secrets:edit:secrets:
    desc: Edit encrypted secrets and sync local mirrored yaml
    cmds:
      - sops edit {{.SECRETS}}/{{.ENC_SECRETS}}
      - rm {{.SECRETS}}.yaml && cp {{.SECRETS}}/{{.ENC_SECRETS}} {{.SECRETS}}.yaml
      - cd {{.SECRETS}} && git add {{.ENC_SECRETS}} && git commit -m "secrets - update" && git push origin HEAD:master

  infra:sops:update-keys:
    desc: Rotate SOPS recipient keys and push secret repo changes
    cmds:
      - sops updatekeys {{.SECRETS}}/*.yaml
      - sops updatekeys {{.SECRETS}}.yaml
      - cd {{.SECRETS}} && git switch master && git add *.yaml .sops.yaml && git commit -m "updated sops keys" && git push

  infra:secrets:decrypt:detaskfile-home:
    internal: true
    cmds:
      - scripts/task/sops-decrypt-to.sh "{{.SECRETS}}/{{.ENC_DETASKFILE}}" "$HOME/Taskfile.yml"

  infra:secrets:new:generate:
    desc: Generate SSH + AGE keys for SOPS bootstrap
    cmds:
      - ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -C "{{.EMAIL}}"
      - mkdir -p ~/.config/sops/age
      - nix-shell -p ssh-to-age --run "ssh-to-age -private-key -i ~/.ssh/id_ed25519 > ~/.config/sops/age/keys.txt"
      - echo "&$(hostname) $(nix-shell -p ssh-to-age --run 'ssh-to-age < ~/.ssh/id_ed25519.pub')"
      - echo "&$(hostname)host $(nix-shell -p ssh-to-age --run 'ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub')"

  infra:secrets:new:copy-nas:
    desc: Copy AGE key from NAS backup path
    vars:
      NAS_PATH: /Volumes/data/security/USB\ Copy_2024-11-24_131715
    cmds:
      - mkdir -p ~/.config/sops/age
      - cp {{.NAS_PATH}}/age-key.txt ~/.config/sops/age/keys.txt

  infra:rebuild:nixos:
    desc: Rebuild local NixOS host and refresh ~/Taskfile.yml
    cmds:
      - task infra:switch:nixos
      - task infra:secrets:decrypt:detaskfile-home

  infra:rebuild:darwin:
    desc: Rebuild local Darwin host and refresh ~/Taskfile.yml
    cmds:
      - task infra:switch:darwin
      - task infra:secrets:decrypt:detaskfile-home

  infra:rebuild:home-manager:
    desc: Rebuild local Home Manager profile and push build commit
    cmds:
      - home-manager switch --flake .?submodules=1#$(hostname) |& nom; task dev:git:build-push
      - task infra:secrets:decrypt:detaskfile-home

  infra:rebuild:wsl:
    desc: Rebuild WSL host configuration
    cmds:
      - sudo nixos-rebuild switch --flake .?submodules=1#guckloch --use-substitutes |& nom; task dev:git:build-push

  infra:rebuild:orb:
    desc: Rebuild OrbStack host configuration and refresh ~/Taskfile.yml
    cmds:
      - sudo nixos-rebuild switch --flake .?submodules=1#$(hostname) --impure |& nom; task dev:git:build-push
      - task infra:secrets:decrypt:detaskfile-home

  infra:switch:*:
    desc: Switch current host using a rebuild command (nixos|darwin)
    vars:
      OS: '{{index .MATCH 0}}'
    cmds:
      - sudo {{.OS}}-rebuild switch --flake .?submodules=1#$(hostname) |& nom

  infra:boot:*:
    desc: "[destructive] Boot into next generation via rebuild command"
    vars:
      OS: '{{index .MATCH 0}}'
    cmds:
      - sudo {{.OS}}-rebuild boot --flake .?submodules=1#$(hostname) |& nom; task dev:git:build-push

  infra:plan:host:*:
    desc: Build/evaluate a specific host closure (no apply)
    vars:
      HOST: '{{index .MATCH 0}}'
    cmds:
      - nix build .#nixosConfigurations.{{.HOST}}.config.system.build.toplevel -L

  infra:apply:host:*:
    desc: Apply a specific remote host configuration (no git side effects)
    vars:
      HOST: '{{index .MATCH 0}}'
    cmds:
      - nixos-rebuild switch --use-remote-sudo --target-host {{.HOST}} --fast --flake .?submodules=1#{{.HOST}} |& nom

  infra:deploy:host:*:
    desc: Plan + apply + validate a specific remote host (no git side effects)
    vars:
      HOST: '{{index .MATCH 0}}'
    cmds:
      - task infra:plan:host:{{.HOST}}
      - task infra:apply:host:{{.HOST}}
      - task services:validate:host:{{.HOST}}

  infra:rollback:apply:host:*:
    desc: Roll back a remote host to previous generation (apply only)
    vars:
      HOST: '{{index .MATCH 0}}'
    cmds:
      - ssh {{.HOST}} "sudo nixos-rebuild switch --rollback"

  infra:rollback:host:*:
    desc: Roll back a remote host to the previous generation (apply-only canonical)
    vars:
      HOST: '{{index .MATCH 0}}'
    cmds:
      - task infra:rollback:apply:host:{{.HOST}}

  infra:logs:host:*:
    desc: "Tail journal logs for a host via ssh (default unit: go-backend)"
    vars:
      HOST: '{{index .MATCH 0}}'
      UNIT: '{{.UNIT | default "go-backend"}}'
    cmds:
      - ssh {{.HOST}} "journalctl -fu {{.UNIT}}"

  infra:deploy:menu:
    desc: Choose a deployment target
    cmds:
      - |
        choice=$(
          {
            printf '%s\n' "infra:deploy:host:{{.PI}}"
            printf '%s\n' infra:deploy:host:garnixMachine infra:deploy:host:mtfuji infra:deploy:host:thinsandy infra:deploy:host:kellerbench
            printf '%s\n' exit
          } | awk '!seen[$0]++' | gum choose
        )
        [ "$choice" = "exit" ] || task "$choice"

  infra:logs:menu:
    desc: Choose a logs target
    cmds:
      - |
        host=$(
          {
            printf '%s\n' {{.PI}}
            printf '%s\n' garnixMachine mtfuji thinsandy kellerbench
            printf '%s\n' exit
          } | awk '!seen[$0]++' | gum choose
        )
        [ "$host" = "exit" ] || task infra:logs:host:$host
