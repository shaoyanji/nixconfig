version: "3"

tasks:
  dev:git:quick-push:
    desc: Commit/push config updates quickly using AI-generated commit messages
    cmds:
      - task dev:git:prehook
      - |
        if ! git diff --cached --quiet; then
          gmc -a --yes
          task dev:git:posthook
        else
          echo "No changes to commit"
        fi

  dev:git:quick-push-safe:
    desc: Commit/push with automatic stash handling using AI-generated commit messages
    cmds:
      - |
        if ! git diff --quiet || ! git diff --cached --quiet; then
          echo "Stashing uncommitted changes..."
          git stash push -m "auto-stash before quick-push"
        fi
      - task dev:git:prehook
      - |
        if ! git diff --cached --quiet; then
          gmc -a --yes
          task dev:git:posthook
        else
          echo "No changes to commit"
        fi
      - |
        if git stash list | grep -q "auto-stash before quick-push"; then
          echo "Restoring stashed changes..."
          git stash pop
        fi

  dev:git:build-push:
    desc: Commit/push after successful build using AI-generated commit messages
    cmds:
      - task dev:git:prehook
      - |
        if ! git diff --cached --quiet; then
          gmc -a -c "Successful build on $(uname -a)" --yes
          task dev:git:posthook
        else
          echo "No changes to commit"
        fi

  dev:git:ai-commit:
    desc: Stage all tracked changes and generate AI commit message (interactive)
    cmds:
      - git add -u
      - gmc -a

  dev:git:ai-commit-push:
    desc: Stage all tracked changes, generate AI commit message, and push
    cmds:
      - git add -u
      - gmc -a --yes
      - git push

  dev:git:quick-pull:
    desc: Pull with submodules and reload Taskfile
    cmds:
      - git pull --recurse-submodules
      - task infra:load:taskfile

  dev:git:prehook:
    desc: Refresh Taskfile.yml from encrypted secrets before commit (stages changed files)
    cmds:
      - task infra:load:taskfile
      - git add -u  # Only stage tracked files, not new untracked files

  dev:git:posthook:
    desc: Push current branch with error handling
    cmds:
      - |
        if ! git push; then
          echo "Error: Git push failed"
          exit 1
        fi

  dev:git:status:
    desc: Show detailed git status including stashed changes
    cmds:
      - echo "=== Current Branch ===" && git branch --show-current
      - echo -e "\n=== Working Tree Status ===" && git status --short
      - echo -e "\n=== Stashed Changes ===" && git stash list

  dev:git:stash-push:
    desc: Stash current changes with a message
    cmds:
      - git stash push -m "auto-stash before operation"

  dev:git:stash-pop:
    desc: Pop most recent stash
    cmds:
      - git stash pop

  dev:site:list:
    desc: List site deployment targets from manifest
    cmds:
      - ./scripts/task/site-target.sh list

  dev:site:show:*:
    desc: Show manifest metadata for a site target
    vars:
      TARGET: '{{index .MATCH 0}}'
    cmds:
      - ./scripts/task/site-target.sh show {{.TARGET}}

  dev:site:build:*:
    desc: Build a site target from manifest
    vars:
      TARGET: '{{index .MATCH 0}}'
    cmds:
      - ./scripts/task/site-target.sh build {{.TARGET}}

  dev:site:preview:*:
    desc: Preview a site target from manifest
    vars:
      TARGET: '{{index .MATCH 0}}'
    cmds:
      - ./scripts/task/site-target.sh preview {{.TARGET}}

  dev:site:deploy:*:
    desc: Deploy a site target from manifest
    vars:
      TARGET: '{{index .MATCH 0}}'
    cmds:
      - ./scripts/task/site-target.sh deploy {{.TARGET}}

  dev:site:build:
    desc: Build the default site target from manifest
    cmds:
      - ./scripts/task/site-target.sh build

  dev:site:preview:
    desc: Preview the default site target from manifest
    cmds:
      - ./scripts/task/site-target.sh preview

  dev:site:deploy:
    desc: Deploy the default site target from manifest
    cmds:
      - ./scripts/task/site-target.sh deploy

  dev:flake:update-branch:
    desc: "[destructive] Create/reset update branch and force-push flake.lock update (fetches main first)"
    cmds:
      - |
        # Ensure we're on main and up to date
        git switch main 2>/dev/null || git checkout main
        git pull --rebase origin main
      - |
        # Check if update branch exists remotely
        if git fetch origin update 2>/dev/null; then
          echo "Warning: Remote update branch exists, will be overwritten"
        fi
      - git branch -D update || true
      - git switch -c update
      - nix flake update
      - task dev:flake:update-garnix
      - git add flake.lock garnix.yaml
      - gmc -c "flake update and garnix sync" --yes
      - git push -f origin update
      - git switch main

  dev:flake:merge-update:
    desc: "[destructive] Merge update branch into main, push result, and delete branch"
    cmds:
      - |
        # Validate update branch exists
        if ! git show-ref --verify --quiet refs/heads/update; then
          echo "Error: update branch does not exist locally"
          exit 1
        fi
      - git switch main
      - git pull --rebase origin main
      - |
        # Merge with explicit message
        if git merge update --no-ff -m "Merge flake updates from update branch"; then
          echo "Merge successful"
        else
          echo "Error: Merge failed - resolve conflicts manually"
          exit 1
        fi
      - git push origin main
      - git branch -d update
      - echo "Update branch merged and deleted"

  dev:flake:update-complete:
    desc: "[destructive] Complete flake update workflow: create branch, update, merge to main, push (all in one)"
    cmds:
      - |
        # Ensure we're on main and up to date
        git switch main 2>/dev/null || git checkout main
        git pull --rebase origin main
      - |
        # Check for uncommitted changes
        if ! git diff --quiet || ! git diff --cached --quiet; then
          echo "Error: Working tree has uncommitted changes"
          echo "Commit or stash them first, or use dev:git:stash-push"
          exit 1
        fi
      - |
        # Check if update branch exists remotely
        if git fetch origin update 2>/dev/null; then
          echo "Warning: Remote update branch exists, will be overwritten"
          read -p "Continue? (y/N) " -n 1 -r
          echo
          if [[ ! $REPLY =~ ^[Yy]$ ]]; then
            echo "Aborted"
            exit 1
          fi
        fi
      - git branch -D update || true
      - git switch -c update
      - nix flake update
      - task dev:flake:update-garnix
      - git add flake.lock garnix.yaml
      - gmc -c "flake update and garnix sync" --yes
      - git push -f origin update
      - git switch main
      - git pull --rebase origin main
      - |
        # Merge with explicit message
        if git merge update --no-ff -m "Merge flake updates from update branch"; then
          echo "Merge successful"
        else
          echo "Error: Merge failed - resolve conflicts manually"
          exit 1
        fi
      - git push origin main
      - git branch -d update
      - echo "Flake update completed successfully"

  dev:flake:update:bountystash:
    desc: Update only the bountystash flake input
    cmds:
      - nix flake update bountystash

  # Extract nixosConfigurations hostnames from flake
  dev:flake:get-hosts:
    cmds:
      - "nix eval --raw .#nixosConfigurations --apply 'hosts: builtins.concatStringsSep \"\\n\" (builtins.attrNames hosts)'"

  # Update garnix.yaml with current nixosConfigurations
  dev:flake:update-garnix:
    cmds:
      - |
        # Start with empty builds.include array
        yq -i '.builds.include = []' garnix.yaml
        # Add each host from flake
        for host in $(task dev:flake:get-hosts); do
          yq -i ".builds.include += [\"nixosConfigurations.$host\"]" garnix.yaml
        done

  dev:config:hash-update:
    desc: Refresh sha256 checksums for all modules/config/*.json files
    cmds:
      - |
        for f in modules/config/*.json; do
          if [[ -f "$f" ]]; then
            echo "Updating $f..."
            scripts/task/nix-hash-update.sh "$f"
          fi
        done

  dev:fmt:
    desc: Format all Nix files with alejandra in-place
    cmds:
      - nix-shell -p alejandra --run "alejandra flake/ hosts/ modules/ overlays/ pkgs/ lib/"

  dev:pkgs:list:
    desc: List all custom packages defined in the flake
    cmds:
      - nix eval --json '.#packages.x86_64-linux' --apply 'builtins.attrNames' 2>/dev/null | jq -r '.[]'

  dev:pkgs:update:*:
    desc: Update a custom package version/hash (e.g. dev:pkgs:update:nullclaw)
    vars:
      PKG: '{{index .MATCH 0}}'
    cmds:
      - nix-shell -p nix-update --run "nix-update --flake --commit --version=bump '.#{{.PKG}}'" || echo "Manual update needed — edit pkgs/{{.PKG}}.nix directly"

  dev:pr:list:
    desc: List open pull requests
    cmds:
      - gh pr list --state open --author "@me" 2>/dev/null || gh pr list --state open

  dev:pr:create:
    desc: Create a pull request from the current branch
    cmds:
      - |
        branch=$(git branch --show-current)
        if [ "$branch" = "main" ]; then
          echo "On main branch — switch to a feature branch first"
          exit 1
        fi
        gh pr create --fill --web

  dev:pr:checkout:*:
    desc: Checkout a pull request by number
    vars:
      PR: '{{index .MATCH 0}}'
    cmds:
      - gh pr checkout {{.PR}}

  dev:pr:review:*:
    desc: Review a pull request by number (opens in browser)
    vars:
      PR: '{{index .MATCH 0}}'
    cmds:
      - gh pr review {{.PR}} --approve || gh pr review {{.PR}}

  dev:pr:status:
    desc: Show CI status for the current branch
    cmds:
      - gh pr checks 2>/dev/null || echo "No open PR for this branch"
