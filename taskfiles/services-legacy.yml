version: "3"

tasks:
  # Removed: pre-hook-rebuild (broken - services:rebuild:pre-hook doesn't exist)
  # Use infra:rebuild:* directly instead

  switch:*:
    desc: "[deprecated] Alias for infra:switch:*"
    vars:
      OS: '{{index .MATCH 0}}'
    cmds:
      - task infra:switch:{{.OS}}

  boot:*:
    desc: "[deprecated] Alias for infra:boot:*"
    vars:
      OS: '{{index .MATCH 0}}'
    cmds:
      - task infra:boot:{{.OS}}

  # Removed: prb:* (redundant - creates circular routing through services layer)
  # Use infra:deploy:host:* directly instead

  nixos-rebuild:
    desc: "[deprecated] Alias for infra:rebuild:nixos"
    cmds:
      - task infra:rebuild:nixos

  darwin-rebuild:
    desc: "[deprecated] Alias for infra:rebuild:darwin"
    cmds:
      - task infra:rebuild:darwin

  home-manager-switch:
    desc: "[deprecated] Alias for infra:rebuild:home-manager"
    cmds:
      - task infra:rebuild:home-manager

  wsl-rebuild:
    desc: "[deprecated] Alias for infra:rebuild:wsl"
    cmds:
      - task infra:rebuild:wsl

  orb-rebuild:
    desc: "[deprecated] Alias for infra:rebuild:orb"
    cmds:
      - task infra:rebuild:orb

  services:deploy:rpi:
    desc: Deploy configured Raspberry Pi host
    cmds:
      - task infra:deploy:host:{{.PI}}

  push-rpi-rebuild:
    desc: "[deprecated] Alias for infra:deploy:host:{{.PI}}"
    cmds:
      - task infra:deploy:host:{{.PI}}

  services:deploy:thinsandy:
    desc: Deploy thinsandy host
    cmds:
      - task infra:deploy:host:thinsandy

  push-thin-rebuild:
    desc: "[deprecated] Alias for infra:deploy:host:thinsandy"
    cmds:
      - task infra:deploy:host:thinsandy

  services:deploy:mtfuji:
    desc: Deploy mtfuji host
    cmds:
      - task infra:deploy:host:mtfuji

  push-fuji-rebuild:
    desc: "[deprecated] Alias for infra:deploy:host:mtfuji"
    cmds:
      - task infra:deploy:host:mtfuji

  services:deploy:menu:
    desc: Compatibility alias for infra:deploy:menu
    cmds:
      - task infra:deploy:menu

  rebuild:
    desc: "[deprecated] Legacy rebuild menu - use infra:rebuild:* or infra:deploy:* directly"
    cmds:
      - |
        choice=$(
          {
            printf '%s\n' infra:rebuild:nixos infra:rebuild:darwin infra:rebuild:home-manager infra:rebuild:wsl infra:rebuild:orb
            printf '%s\n' "infra:deploy:host:{{.PI}}"
            printf '%s\n' infra:deploy:host:garnixMachine infra:deploy:host:mtfuji infra:deploy:host:thinsandy infra:deploy:host:kellerbench
            printf '%s\n' exit
          } | awk '!seen[$0]++' | gum choose
        )
        task "$choice"

  services:logs:menu:
    desc: Compatibility alias for infra:logs:menu
    cmds:
      - task infra:logs:menu
