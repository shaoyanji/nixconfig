version: "3"

tasks:
  agents:menu:
    desc: Interactive operator control plane menu
    cmds:
      - |
        choice=$(printf '%s\n' rebuild edit-config update load browse new incus sudologinssh help status check deploy logs exit | gum choose)
        task "$choice"

  browse:
    desc: "[deprecated] Legacy browse menu - use direct commands"
    cmds:
      - |
        choice=$(printf '%s\n' browse-notes browse-internet browse-projects exit | gum choose)
        task "$choice"

  browse-notes:
    desc: Open quick notes
    cmds:
      - $EDITOR ~/Documents/Obsidian-Git-Sync/quicknote.md

  browse-internet:
    desc: Open browser search
    cmds:
      - zen https://duckduckgo.com

  browse-projects:
    desc: Open projects page
    cmds:
      - zen https://shaoyanji.github.io

  projects:
    desc: Alias for browse-projects
    cmds:
      - task browse-projects

  edit-config:
    desc: "[deprecated] Legacy edit-config menu - use infra:secrets:edit:* or direct file edits"
    cmds:
      - |
        choice=$(printf '%s\n' infra:secrets:edit:taskfile infra:secrets:edit:detaskfile infra:secrets:edit:apikeys infra:secrets:edit:secrets edit-global edit-sops edit-sops-config edit-home-manager edit-shell-config exit | gum choose)
        task "$choice"

  edit-global:
    desc: Edit global nix module
    cmds:
      - $EDITOR ./modules/global/global.nix

  edit-sops:
    desc: Edit .sops.yaml and update recipients
    cmds:
      - $EDITOR .sops.yaml
      - task infra:sops:update-keys

  edit-sops-config:
    desc: Edit sops Nix module config
    cmds:
      - $EDITOR ./modules/sops.nix

  edit-home-manager:
    desc: Edit canonical home role module
    cmds:
      - $EDITOR ./modules/roles/home.nix

  edit-shell-config:
    desc: Edit shell module defaults
    cmds:
      - $EDITOR ./modules/shell/default.nix

  update:
    desc: "[deprecated] Legacy update menu - use dev:git:* or dev:flake:* directly"
    cmds:
      - |
        choice=$(printf '%s\n' dev:git:ai-commit-push dev:git:quick-pull dev:flake:update-branch infra:sops:update-keys exit | gum choose)
        task "$choice"

  new:
    desc: "[deprecated] Legacy bootstrap menu - use infra:secrets:new:* directly"
    cmds:
      - |
        choice=$(printf '%s\n' infra:secrets:new:generate infra:secrets:new:copy-nas exit | gum choose)
        task "$choice"

  incus:
    desc: Launch and attach to a temporary NixOS Incus container
    cmds:
      - sudo incus launch "images:nixos/unstable" nixos -c security.nesting=true
      - sudo incus list
      - sudo incus console nixos

  sudologinssh:
    desc: Run a sudo-login command from encrypted server command list
    cmds:
      - ssh $(sops -d --extract '["server"]["commands"]' {{.SECRETS}}/{{.ENC_SECRETS}} | gum choose)

  agents:xs:status:
    desc: Show xs-helper status for the local store
    cmds:
      - scripts/task/xs-helper.sh status

  agents:xs:doctor:
    desc: Run the xs-helper doctor check (local + service)
    cmds:
      - scripts/task/xs-helper.sh doctor

  agents:xs:topics:
    desc: List recent xs topics
    cmds:
      - scripts/task/xs-helper.sh topics

  agents:xs:show:*:
    desc: Show recent frames for a topic
    vars:
      TOPIC: '{{index .MATCH 0}}'
    cmds:
      - scripts/task/xs-helper.sh show {{.TOPIC}}

  agents:xs:tail:*:
    desc: Follow a topic stream locally
    vars:
      TOPIC: '{{index .MATCH 0}}'
    cmds:
      - scripts/task/xs-helper.sh tail {{.TOPIC}}

  agents:xs:get-artifact:*:
    desc: Lookup artifact metadata by ID
    vars:
      ARTIFACT: '{{index .MATCH 0}}'
    cmds:
      - scripts/task/xs-helper.sh get-artifact {{.ARTIFACT}}

  agents:xs:cat-artifact:*:
    desc: Stream an artifact body by ID
    vars:
      ARTIFACT: '{{index .MATCH 0}}'
    cmds:
      - scripts/task/xs-helper.sh cat-artifact {{.ARTIFACT}}

  agents:xs:service:status:
    desc: Inspect the live xs systemd service
    cmds:
      - scripts/task/xs-helper.sh service-status

  agents:xs:service:show:*:
    desc: Show frames from the service store
    vars:
      TOPIC: '{{index .MATCH 0}}'
    cmds:
      - scripts/task/xs-helper.sh service-show {{.TOPIC}}

  agents:xs:service:tail:*:
    desc: Tail a service topic stream
    vars:
      TOPIC: '{{index .MATCH 0}}'
    cmds:
      - scripts/task/xs-helper.sh service-tail {{.TOPIC}}

  agents:xs:materialize:*:*:
    desc: Build a task_view context pack from local xs frames
    vars:
      TOPIC: '{{index .MATCH 0}}'
      TARGET: '{{index .MATCH 1}}'
      LAST: '{{.LAST | default 400}}'
    cmds:
      - scripts/task/xs-helper.sh materialize {{.TOPIC}} {{.TARGET}} --last {{.LAST}}

  agents:xs:service:materialize:*:*:
    desc: Build a task_view context pack from service xs frames
    vars:
      TOPIC: '{{index .MATCH 0}}'
      TARGET: '{{index .MATCH 1}}'
      LAST: '{{.LAST | default 400}}'
    cmds:
      - scripts/task/xs-helper.sh --service materialize {{.TOPIC}} {{.TARGET}} --last {{.LAST}}

  # OAuth/session management for AI service users
  agents:oauth:list:
    desc: List known services and OAuth tools
    cmds:
      - scripts/task/service-oauth.sh list

  agents:oauth:paths:*:
    desc: Show auth file paths for a service
    vars:
      SERVICE: '{{index .MATCH 0}}'
    cmds:
      - scripts/task/service-oauth.sh paths {{.SERVICE}}

  agents:oauth:status:*:*:
    desc: Check OAuth status for a service/tool
    vars:
      SERVICE: '{{index .MATCH 0}}'
      TOOL: '{{index .MATCH 1}}'
    cmds:
      - scripts/task/service-oauth.sh status {{.SERVICE}} {{.TOOL}}

  agents:oauth:login:*:*:
    desc: Run interactive OAuth login for a service/tool
    vars:
      SERVICE: '{{index .MATCH 0}}'
      TOOL: '{{index .MATCH 1}}'
    cmds:
      - scripts/task/service-oauth.sh login {{.SERVICE}} {{.TOOL}}

  agents:oauth:exec:*:*:
    desc: Run tool command as service user (args after --)
    vars:
      SERVICE: '{{index .MATCH 0}}'
      TOOL: '{{index .MATCH 1}}'
    cmds:
      - scripts/task/service-oauth.sh exec {{.SERVICE}} {{.TOOL}} -- {{.CLI_ARGS}}
