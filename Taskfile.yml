version: "3"

vars:
  EMAIL: e@mail.shaoyanji.is-a.dev
  ENC_DETASKFILE: DE-Taskfile.yaml
  ENC_TASKFILE: Taskfile.yaml
  ENC_SECRETS: secrets.yaml
  ENC_ENVS: apikeys.yaml
  SECRETS: modules/secrets
  PI: minyx

includes:
  infra:
    taskfile: ./taskfiles/infra.yml
    flatten: true
  services:
    taskfile: ./taskfiles/services.yml
    flatten: true
  checks:
    taskfile: ./taskfiles/checks.yml
    flatten: true
  agents:
    taskfile: ./taskfiles/agents.yml
    flatten: true
  dev:
    taskfile: ./taskfiles/dev.yml
    flatten: true

tasks:
  default:
    desc: Show available operator commands
    cmds:
      - task help

  help:
    desc: List all tasks in the control plane
    cmds:
      - task --list-all

  status:
    desc: Show repo/operator status
    cmds:
      - git status --short
      - echo "host=$(hostname)"

  check:
    desc: Run narrow validation checks
    cmds:
      - task checks:quick

  deploy:
    desc: Open deployment menu
    cmds:
      - task infra:deploy:menu

  logs:
    desc: Open logs menu
    cmds:
      - task infra:logs:menu

  menu:
    desc: Open operator menu
    cmds:
      - task agents:menu

  exit:
    internal: true
    cmds:
      - exit
    silent: true
